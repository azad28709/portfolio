<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crypto Screener</title>

<link rel="stylesheet" href="style.css">
<style>body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
transition:0.3s;
}

.light{
background:#f1f5f9;
color:black;
}

.container{
width:90%;
max-width:900px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
}

.top-bar{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

input{
flex:1;
padding:12px;
border-radius:6px;
border:none;
}

button{
padding:12px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

.light table{
background:white;
}

th,td{
padding:12px;
border-bottom:1px solid #334155;
}

th{
background:#2563eb;
color:white;
}

tr:hover{
background:#334155;
}

.light tr:hover{
background:#e2e8f0;
}

.green{
color:#22c55e;
}

.red{
color:#ef4444;
}

.coin{
display:flex;
align-items:center;
gap:10px;
}

.coin img{
width:25px;
height:25px;
}</style>
</head>

<body>

<div class="container">

<h1>Crypto Screener</h1>

<div class="top-bar">

<input type="text" id="search" placeholder="Search coin...">

<button onclick="sortByPrice()">Sort Price ↓</button>

<button onclick="toggleMode()">Dark / Light</button>

</div>

<table>

<thead>
<tr>
<th>Coin</th>
<th>Price (USD)</th>
<th>24h Change</th>
</tr>
</thead>

<tbody id="cryptoTable">

</tbody>

</table>

</div>

<script>const table = document.getElementById("cryptoTable")
const searchInput = document.getElementById("search")

let cryptoData = []

fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd")

.then(res => res.json())

.then(data => {

cryptoData = data

displayData(data)

})

function displayData(data){

table.innerHTML = ""

data.forEach(coin => {

let changeClass =
coin.price_change_percentage_24h > 0
? "green"
: "red"

table.innerHTML += `

<tr>

<td class="coin">

<img src="${coin.image}">

${coin.name}

</td>

<td>

$${coin.current_price}

</td>

<td class="${changeClass}">

${coin.price_change_percentage_24h.toFixed(2)}%

</td>

</tr>

`

})

}

searchInput.addEventListener("keyup", () => {

let value =
searchInput.value.toLowerCase()

let filtered =
cryptoData.filter(coin =>

coin.name.toLowerCase().includes(value)

)

displayData(filtered)

})

function sortByPrice(){

let sorted =
[...cryptoData].sort((a,b)=>

b.current_price - a.current_price

)

displayData(sorted)

}

function toggleMode(){

document.body.classList.toggle("light")

}</script>

</body>
</html>
